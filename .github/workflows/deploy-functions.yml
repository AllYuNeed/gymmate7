name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # FIX: Apply all database migrations so tables exist in production
      - name: Push database migrations
        run: |
          supabase db push --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy edge functions
        run: |
          supabase functions deploy generate-diet-plan --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy generate-routine --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy vapid-key --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy send-push --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy quest-reminders --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy season-reset --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Set secrets
        run: |
          supabase secrets set OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase secrets set VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }} --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase secrets set VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }} --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase secrets set VAPID_SUBJECT=mailto:mortalgyms@gmail.com --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
